name: parkshare
description: "ParkShare - AI-Powered Peer-to-Peer Parking Space Marketplace Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database/Networking
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # Utility & UI Packs
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_spinkit: 5.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
